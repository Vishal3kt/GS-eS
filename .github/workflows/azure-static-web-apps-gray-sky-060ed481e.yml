name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Install Node
      - name: Install dependencies
        run: npm install

      # Build Angular app
      - name: Build Angular App
        run: npm run build

      # Copy routing config to dist
      - name: Copy routing config
        run: cp staticwebapps.config.json dist/gsand-es/

      # Deploy to Azure
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_SKY_060ED481E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist/gsand-es"
          output_location: ""
