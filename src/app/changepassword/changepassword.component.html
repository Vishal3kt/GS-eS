<div class="container-fluid">
    <div >
      <div class="col-md-5 col-lg-5 col-xl-5 col-sm-12 col-xs-12">
        <div>
       <div class="card-body" *ngIf="intialVal">
            <form
              [formGroup]="changepasswordform"
              (ngSubmit)="onSubmit()"
              class="my-form change-password-box"
            >
              <div class="titlehead"><span class="tittle">Change Password</span></div>
              
              <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label>Email Address</mat-label>
                <input
                  matInput
                  type="text"
                  autocomplete="username"
                  formControlName="Email"
                  placeholder="Enter your email address"
                  readonly
                />
                <mat-error *ngIf="tempData.Email.errors && (tempData.Email.touched || submitted)">
                  <span *ngIf="tempData.Email.errors.required">Please enter your email address</span>
                </mat-error>
              </mat-form-field>

              <button 
                type="submit" 
                mat-raised-button 
                class="w-100 mb-3"
                [disabled]="loading">
                <span *ngIf="!loading">SUBMIT</span>
                <span *ngIf="loading">
                  <mat-progress-spinner 
                    diameter="20" 
                    mode="indeterminate">
                  </mat-progress-spinner>
                  Submitting...
                </span>
              </button>

            </form>
          </div>
            <div class="card-body" *ngIf="success">
            <form class="my-form">
              <div><span class="tittletextsuccs">Password Reset Successful</span></div>
              <div class="textbelow">
                <label class="endtxt"
                  >Awesome!
                </label>
                <p class="forgottext">
                  Back To <span class="span" (click)="finalVal()">Sign In</span>
                </p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
</div>
