<div class="container-fluid">
  <div class="row topcss">
    <div class="col-sm-2 logo">
      <img  (click)="goToHome()" class="logo-3KT" src="../../assets/3KT-Logo.png" alt="" />
      <img  (click)="goToHome()" class="logo" src="../../assets/images/logo 2.png" alt="" />
    </div>
  </div>
  <div class="row">
    <div class="col-md-7 col-lg-7 col-xl-7 col-sm-12 col-xs-12 hidedata text-center">
      <img
        class="imgleftlogo"
        src="../../assets/images/image 3.png"
        alt="Girl in a jacket"
      />
    </div>
    <div class="col-md-5 col-lg-5 col-xl-5 col-sm-12 col-xs-12">
      <div class="card well">
        <div class="card-body">
          <form
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()"
            class="my-form"
          >

           <mat-form-field appearance="outline" class="w-100 mb-3">
            <mat-label>Email</mat-label>
            <input
              matInput
              type="text"
              autocomplete="username"
              formControlName="email"
              placeholder="Enter your email"
            />
            <mat-error *ngIf="tempData.email.errors && (tempData.email.touched || submitted)">
              <span *ngIf="tempData.email.errors.required">Please enter your email address</span>
              <span *ngIf="tempData.email.errors.email">
                Please enter a valid email address
              </span>
            </mat-error>
          </mat-form-field>

            <mat-form-field appearance="outline" class="w-100 mb-3">
            <mat-label>Password</mat-label>
            <input
              matInput
              [type]="hidePassword ? 'password' : 'text'"
              autocomplete="current-password"
              formControlName="password"
              placeholder="Enter your password"
            />
            <button mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="tempData.password.errors && (tempData.password.touched || submitted)">
              <span *ngIf="tempData.password.errors.required">Please enter your password</span>
            </mat-error>
          </mat-form-field>

            <mat-checkbox class="mb-3" (change)="checkValue($event)" id="rememberMe">
              Remember me
            </mat-checkbox>

            <button 
              type="submit" 
              mat-raised-button 
              class="w-100 mb-3">
              LOGIN
            </button>

            <div class="help">
              <p class="forgottext">
                Forgotten your login details?
                <br />
                <a routerLink="/forgot" (click)="goToForget()">Get Help</a> Signing In
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <div class="row copyright">
    <div class="col-sm-12 col-md-12 col-xl-12">
      <p class="copyrighttext">
        Copyright 2026 3K Technologies. All Rights Reserved. "3K" is a
        registered trademark of 3K Technologies
      </p>
    </div>
  </div>
</div>
