<div class="container">
  <div class="table-responsive mat-elevation-z2">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z0">
      <ng-container matColumnDef="sno">
        <th mat-header-cell *matHeaderCellDef>S.No</th>
        <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>
      <ng-container matColumnDef="startdate">
        <th mat-header-cell *matHeaderCellDef>Start Date</th>
        <td mat-cell *matCellDef="let row">{{ row.startdate | date:'MM-dd-yyyy' }}</td>
      </ng-container>
      <ng-container matColumnDef="enddate">
        <th mat-header-cell *matHeaderCellDef>End Date</th>
        <td mat-cell *matCellDef="let row">{{ row.enddate | date:'MM-dd-yyyy' }}</td>
      </ng-container>
      <ng-container matColumnDef="totalterms">
        <th mat-header-cell *matHeaderCellDef>Total Hours</th>
        <td mat-cell *matCellDef="let row">{{ row.totalterms }}</td>
      </ng-container>
      <ng-container matColumnDef="remainingterms">
        <th mat-header-cell *matHeaderCellDef>Remaining Hours</th>
        <td mat-cell *matCellDef="let row">{{ row.remainingterms }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="7">No report data available.</td>
      </tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>
</div>
